spring.application.name=supermarket-api

# DATASOURCE
spring.datasource.url=jdbc:h2:mem:supermarket-db
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update

# LOGGING
logging.level.com.massemiso.supermarket_api=INFO
logging.level.org.hibernate=INFO

# JWT
security.jwt.key.private=f043c350d733e63ffb7d66987f0a5577f896077c64b400324541ebd60befa888
security.jwt.user.generator=AUTH0-JWT-BACKEND
security.jwt.token.time=3600000

# SWAGGER UI
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.customCss=.swagger-ui.links{display:none;}