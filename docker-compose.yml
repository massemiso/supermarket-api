services:

  db:
    image: postgres:15
    container_name: supermarket-db
    environment:
      # please set the required variables in the .env file if you want security
      POSTGRES_DB: ${POSTGRES_DB:-supermarket_db}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}

    # DEAL WITH PERMISSIONS AND LOGS
    user: root
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /var/log/postgresql
        chown -R postgres:postgres /var/log/postgresql
        exec docker-entrypoint.sh postgres \
          -c log_destination=stderr,csvlog \
          -c logging_collector=on \
          -c log_directory=/var/log/postgresql \
          -c log_filename=postgresql-%Y-%m-%d_%H%M%S.log \
          -c log_file_mode=0644 \
          -c log_min_messages=info \
          -c log_statement=all \
          -c log_connections=on \
          -c log_disconnections=off
    # ------------------------
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/logs/db:/var/log/postgresql
    deploy:
      resources:
        limits:
          memory: 256M

  app:
    build: .
    container_name: supermarket-api
    depends_on:
      - db
    environment:
      # please set the required variables in the .env file if you want security
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-supermarket_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-password}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      JWT_SECRET: ${JWT_SECRET:-f043c350d733e63ffb7d66987f0a5577f896077c64b400324541ebd60befa888}
      JWT_USER_GENERATOR: ${JWT_USER_GENERATOR:-AUTH0-JWT-BACKEND}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}
      PROD_ADMIN_USERNAME: ${PROD_ADMIN_USERNAME:-sysadmin}
      PROD_ADMIN_PASSWORD: ${PROD_ADMIN_PASSWORD:-sysadmin123}
      PROD_ADMIN_EMAIL: ${PROD_ADMIN_EMAIL:-sysadmin@supermarket.com}
      # ----------------------------------------------------------------------------
      JAVA_TOOL_OPTIONS: "-Xmx384m -Xms128m"
      LOGGING_FILE_NAME: /app/logs/spring.log
    volumes:
        - ./docker/logs/app:/app/logs
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:stable-alpine
    container_name: supermarket-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/logs/nginx:/var/log/nginx
      - ./docker/certs:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - default
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  postgres_data: