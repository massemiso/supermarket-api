services:

  db:
    image: postgres:15
    container_name: supermarket-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    # DEAL WITH PERMISSIONS AND LOGS
    user: root
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /var/log/postgresql
        chown -R postgres:postgres /var/log/postgresql
        exec docker-entrypoint.sh postgres \
          -c log_destination=stderr,csvlog \
          -c logging_collector=on \
          -c log_directory=/var/log/postgresql \
          -c log_filename=postgresql-%Y-%m-%d_%H%M%S.log \
          -c log_file_mode=0644 \
          -c log_min_messages=info \
          -c log_statement=all \
          -c log_connections=on \
          -c log_disconnections=off
    # ------------------------
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/logs/db:/var/log/postgresql
    deploy:
      resources:
        limits:
          memory: 256M

  app:
    build: .
    env_file: .env
    container_name: supermarket-api
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JAVA_TOOL_OPTIONS: "-Xmx384m -Xms128m"
      LOGGING_FILE_NAME: /app/logs/spring.log
    volumes:
        - ./docker/logs/app:/app/logs
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:stable-alpine
    container_name: supermarket-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/logs/nginx:/var/log/nginx
      - ./docker/certs:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - default
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  postgres_data: